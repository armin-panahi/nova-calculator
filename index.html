<!doctype html>

<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nova Calculator</title>

    <link
      rel="shortcut icon"
      href="./assets/images/nova-logo.png"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="./src/css/variables.css" />
    <link rel="stylesheet" href="./src/css/base.css" />
    <link rel="stylesheet" href="./src/css/layout.css" />
    <link rel="stylesheet" href="./src/css/calculator.css" />
    <link rel="stylesheet" href="./src/css/converter.css" />
    <link rel="stylesheet" href="./src/css/main.css" />
    <link rel="stylesheet" href="./src/css/responsive.css" />
    <link rel="stylesheet" href="./src/css/animations.css" />

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <!-- Drawer Overlay -->

    <div class="drawer-overlay"></div>

    <main class="app">
      <!-- ==========================
       SIDEBAR
  =========================== -->

      <aside class="side-drawer">
        <div class="drawer-header">
          <div class="drawer-header-top">
            <div>
              <h2>Nova</h2>
              <p>Utilities</p>
            </div>

            <button
              id="drawerClose"
              class="drawer-close-btn"
              aria-label="Close Menu"
            >
              <i data-lucide="x"></i>
            </button>
          </div>
        </div>

        <nav class="drawer-menu">
          <button class="drawer-item active" data-page="calculator">
            <i data-lucide="calculator"></i>
            <span>Calculator</span>
          </button>

          <button class="drawer-item" data-page="converter">
            <i data-lucide="ruler"></i>
            <span>Unit Converter</span>
          </button>

          <button class="drawer-item" data-page="currency">
            <i data-lucide="badge-dollar-sign"></i>
            <span>Currency Converter</span>
          </button>

          <button class="drawer-item" id="scientificToggle">
            <i data-lucide="sigma"></i>
            <span>Scientific Mode</span>
          </button>
        </nav>
      </aside>

      <!-- ==========================
       CALCULATOR
  =========================== -->

      <section class="calculator page-view active" id="calculatorView">
        <!-- Header -->

        <header class="calculator-header">
          <div class="brand">
            <span class="brand-icon"> ✦ </span>

            <div>
              <h1>Nova</h1>
              <p>Smart Calculator</p>
            </div>
          </div>

          <div class="header-actions">
            <button id="historyToggle" class="history-btn" aria-label="History">
              <i data-lucide="history"></i>
            </button>

            <button id="themeToggle" class="theme-btn" aria-label="Theme">
              <i data-lucide="moon"></i>
            </button>

            <button id="menuToggle" class="menu-btn" aria-label="Menu">
              <i data-lucide="menu"></i>
            </button>
          </div>
        </header>

        <!-- Display -->

        <section class="display-section">
          <div class="last-calculation" id="lastCalculation">
            Last calculation
          </div>

          <div class="expression" id="expression">0</div>

          <div class="result" id="result">0</div>
        </section>

        <!-- History Panel -->

        <div class="history-panel" id="historyPanel">
          <div class="history-header">
            <h2>History</h2>

            <button id="clearHistory" class="clear-history-btn">Clear</button>
          </div>

          <div class="history-list" id="historyList"></div>
        </div>

        <!-- ==========================
         SCIENTIFIC PANEL
    =========================== -->

        <section class="scientific-panel" id="scientificPanel">
          <button class="scientific-btn" data-scientific="sin">sin</button>

          <button class="scientific-btn" data-scientific="cos">cos</button>

          <button class="scientific-btn" data-scientific="tan">tan</button>

          <button class="scientific-btn" data-scientific="log">log</button>

          <button class="scientific-btn" data-scientific="pi">π</button>

          <button class="scientific-btn" data-scientific="sqrt">√</button>

          <button class="scientific-btn" data-scientific="square">x²</button>

          <button class="scientific-btn" data-scientific="power">xʸ</button>
        </section>

        <!-- Keypad -->

        <section class="keypad" id="keypad">
          <!-- Row 1 -->

          <button class="action" data-action="clear">AC</button>

          <button class="action" data-action="delete">⌫</button>

          <button class="action" data-action="percent">%</button>

          <button class="operator" data-operator="/">÷</button>

          <!-- Row 2 -->

          <button data-number="7">7</button>
          <button data-number="8">8</button>
          <button data-number="9">9</button>

          <button class="operator" data-operator="*">×</button>

          <!-- Row 3 -->

          <button data-number="4">4</button>
          <button data-number="5">5</button>
          <button data-number="6">6</button>

          <button class="operator" data-operator="-">−</button>

          <!-- Row 4 -->

          <button data-number="1">1</button>
          <button data-number="2">2</button>
          <button data-number="3">3</button>

          <button class="operator" data-operator="+">+</button>

          <!-- Row 5 -->

          <button class="zero" data-number="0">0</button>

          <button data-number=".">.</button>

          <button class="equal" data-action="equal">=</button>
        </section>
      </section>

      <!-- ==========================
     UNIT CONVERTER
========================== -->

      <section class="converter-view page-view" id="converterView">
        <div class="converter-container">
          <div class="converter-header">
            <h2>Unit Converter</h2>

            <p>Convert anything instantly</p>
          </div>

          <div class="converter-presets">
            <button
              class="preset-card"
              data-category="length"
              data-from="meter"
              data-to="foot"
            >
              Meter → Foot
            </button>

            <button
              class="preset-card"
              data-category="length"
              data-from="kilometer"
              data-to="mile"
            >
              KM → Mile
            </button>

            <button
              class="preset-card"
              data-category="weight"
              data-from="kilogram"
              data-to="pound"
            >
              KG → Pound
            </button>

            <button
              class="preset-card"
              data-category="temperature"
              data-from="celsius"
              data-to="fahrenheit"
            >
              °C → °F
            </button>

            <button
              class="preset-card"
              data-category="data"
              data-from="megabyte"
              data-to="gigabyte"
            >
              MB → GB
            </button>

            <button
              class="preset-card"
              data-category="speed"
              data-from="kph"
              data-to="mph"
            >
              KM/H → MPH
            </button>
          </div>

          <div class="converter-form">
            <div class="converter-group">
              <label> Category </label>

              <select id="converterCategory">
                <option value="length">Length</option>

                <option value="weight">Weight</option>

                <option value="temperature">Temperature</option>

                <option value="area">Area</option>

                <option value="volume">Volume</option>

                <option value="speed">Speed</option>

                <option value="time">Time</option>

                <option value="data">Data Storage</option>

                <option value="energy">Energy</option>

                <option value="pressure">Pressure</option>

                <option value="angle">Angle</option>

                <option value="frequency">Frequency</option>
              </select>
            </div>

            <div class="converter-group">
              <label> From </label>

              <select id="converterFrom"></select>
            </div>

            <div class="converter-group">
              <label> To </label>

              <select id="converterTo"></select>
            </div>

            <button id="swapUnits" class="swap-btn">⇄</button>

            <div class="converter-group">
              <label> Value </label>

              <input
                type="number"
                id="converterValue"
                placeholder="Enter value"
              />
            </div>

            <div class="converter-result">
              <span> Result </span>

              <h3 id="converterResult">0</h3>

              <div class="converter-result-actions">
                <button id="copyConverterResult" class="converter-action-btn">
                  Copy
                </button>

                <button id="clearConverter" class="converter-action-btn">
                  Clear
                </button>
              </div>
            </div>

            <div class="converter-history">
              <div class="converter-history-header">
                <h3>Recent Conversions</h3>

                <button id="clearConverterHistory" class="converter-clear-btn">
                  Clear
                </button>
              </div>

              <div
                id="converterHistoryList"
                class="converter-history-list"
              ></div>
            </div>
          </div>
        </div>
      </section>

      <!-- ==========================
     CURRENCY PLACEHOLDER
========================== -->

      <section class="currency-view page-view" id="currencyView">
        <div class="converter-container">
          <div class="converter-header">
            <h2>Currency Converter</h2>

            <p>Coming Soon</p>
          </div>
        </div>
      </section>
    </main>

    <script>
      lucide.createIcons();
    </script>

    <script src="./src/js/storage.js"></script>
    <script src="./src/js/calculator.js"></script>
    <script src="./src/js/history.js"></script>
    <script src="./src/js/theme.js"></script>
    <script src="./src/js/converter.js"></script>
    <script src="./src/js/converter-history.js"></script>
    <script src="./src/js/app.js"></script>
    <script src="./src/js/navigation.js"></script>
  </body>
</html>
